name: Determinism Re-Execution Check

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.cpp'
      - '**.h'
      - '.github/workflows/determinism_recheck.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.cpp'
      - '**.h'
      - '.github/workflows/determinism_recheck.yml'

jobs:
  determinism_test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build SRF
        run: bash benchmarks/build.sh

      - name: Set up Python and install dependencies
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy statsmodels scikit-learn matplotlib seaborn

      - name: Prepare Datasets
        run: |
          bash scripts/download_datasets.sh
          python3 scripts/prepare_sequences.py
          python3 scripts/prepare_graphs.py
          python3 scripts/generate_extreme_datasets.py

      - name: Run 1 - Generate first log
        run: |
          export SRF_LOG_FILE="results/csv/determinism_log_1.csv"
          bash benchmarks/run_benchmarks.sh

      - name: Run 2 - Generate second log
        run: |
          export SRF_LOG_FILE="results/csv/determinism_log_2.csv"
          bash benchmarks/run_benchmarks.sh

      - name: Compare logs for bit-exact equivalence
        run: |
          echo "Comparing determinism_log_1.csv and determinism_log_2.csv..."
          # The header contains the platform, which can differ, so we compare from the second line.
          # We exclude the non-deterministic runtime (col 4) and memory (col 5) fields from the diff.
          diff <(tail -n +2 results/csv/determinism_log_1.csv | cut -d, -f1-3,6-) <(tail -n +2 results/csv/determinism_log_2.csv | cut -d, -f1-3,6-)
          if [ $? -eq 0 ]; then
            echo "SUCCESS: Logs are identical. Determinism holds."
          else
            echo "FAILURE: Logs are different. Determinism is violated."
            exit 1
          fi

      - name: Upload CSV artifacts for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: determinism-failure-logs
          path: |
            results/csv/determinism_log_1.csv
            results/csv/determinism_log_2.csv
          retention-days: 7
