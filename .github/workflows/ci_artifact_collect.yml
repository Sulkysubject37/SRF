name: Result Aggregation

on:
  workflow_run:
    workflows:
      - "Compiler Diversity Validation"
      - "Optimization-Level Invariance"
      - "Memory-Constraint Behaviour"
      - "Determinism Re-Execution Check"
    type:
      - completed

jobs:
  collect-artifacts:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Create unified archive
        run: |
          mkdir -p consolidated_results
          find artifacts -name "*.csv" -exec cp {} consolidated_results/ \;
          tar -czvf srf_ci_results.tar.gz consolidated_results
          
      - name: Upload unified artifact archive
        uses: actions/upload-artifact@v4
        with:
          name: srf-consolidated-ci-results
          path: srf_ci_results.tar.gz
          retention-days: 30
