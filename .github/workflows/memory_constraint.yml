name: Memory-Constraint Behaviour

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.cpp'
      - '**.h'
      - '.github/workflows/memory_constraint.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.cpp'
      - '**.h'
      - '.github/workflows/memory_constraint.yml'

jobs:
  memory_test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build SRF
        run: bash benchmarks/build.sh

      - name: Set up Python and install dependencies
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy statsmodels scikit-learn matplotlib seaborn

      - name: Run bounded workloads with memory limit
        run: |
          export SRF_LOG_FILE="results/csv/memory_constraint_log.csv"
          # Apply a 256MB memory limit (in KB for ulimit)
          ulimit -v 262144
          bash benchmarks/run_benchmarks.sh
      
      - name: Upload CSV artifact
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: memory-constraint-log
          path: results/csv/memory_constraint_log.csv
          if-no-files-found: warn
          retention-days: 7
